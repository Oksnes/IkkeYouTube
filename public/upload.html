<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="upload.css">
    <script src="upload.js" defer></script>
</head>
<body>
    <main>
        <h2>Upload a Video!</h2>
        <form  autocomplete="off">
            
            <label for="Title">Videotitle:</label>
            <input type="text" id="Title" name="Title" required>

            <label for="Video">Video (max 2GiB):</label>
            <input type="file" id="Video" name="Video" accept="video/mp4, video/webm, video/ogg">

            <label for="Thumbnail">Thumbnail:</label>
            <input type="file" id="Thumbnail" name="Thumbnail" accept="image/png, image/jpeg, image/webp">

            <label for ="Description">Description:</label>
            <textarea id="Description" name="Description" rows="4" cols="50"></textarea>

            <button id="uploadButton" type="submit">Upload Video</button>
        </form>
        <p> Back to <a href="home.html">>home<</a></p>
    </main>
</body>
</html>
