<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="register.js" defer></script>
</head>
<body>
    <img src="/Images/ikkeyoutube.webp" alt="IkkeYouTube Logo" class="logo">
    <main>
        <h2>Register a User!</h2>
        <form  autocomplete="off">
            
            <label for="Username">Username:</label>
            <input type="text" id="Username" name="Username" required>

            <label for="Password">Password:</label>
            <input type="password" id="Password" name="Password" required>

            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email" required>

            <label for="ProfilePicture">Profile Picture:</label>
            <input type="file" id="ProfilePicture" name="ProfilePicture" accept="image/png, image/jpeg, image/webp">

            <button id="registerButton" type="submit">Create user</button>
        </form>
        <p> Allready have a user? <a href="login.html">>Login<</a></p>
    </main>
</body>
</html>
